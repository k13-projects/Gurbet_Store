<svg width="560" height="150" viewBox="0 0 560 150" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="t d">
  <title id="t">GURBET Türkiye Drops</title>
  <desc id="d">Elegant serif GURBET wordmark with crescent monogram and Türkiye Drops tagline. Ink-on-light primary lockup.</desc>
  <defs>
    <mask id="cres2">
      <rect width="150" height="150" fill="#000"/>
      <circle cx="40" cy="68" r="30" fill="#fff"/>
      <circle cx="60.2" cy="68" r="30" fill="#000"/>
    </mask>
  </defs>
  <!-- monogram -->
  <g transform="translate(20 7)">
    <circle cx="40" cy="68" r="40" stroke="#B8923F" stroke-width="2" fill="none"/>
    <rect width="150" height="150" fill="#7A1815" mask="url(#cres2)"/>
    <path d="M61 38l2.4 6.4 6.4 2.4-6.4 2.4-2.4 6.4-2.4-6.4-6.4-2.4 6.4-2.4z" fill="#B8923F"/>
  </g>
  <!-- wordmark -->
  <text x="150" y="92" fill="#15110D" font-family="'Playfair Display','Didot','Bodoni 72',Georgia,serif" font-size="74" font-weight="600" letter-spacing="2">GURBET</text>
  <line x1="152" y1="112" x2="470" y2="112" stroke="#B8923F" stroke-width="1.5"/>
  <text x="152" y="133" fill="#7A1815" font-family="'Playfair Display','Didot',Georgia,serif" font-size="19" letter-spacing="9">TÜRKİYE DROPS</text>
</svg>
